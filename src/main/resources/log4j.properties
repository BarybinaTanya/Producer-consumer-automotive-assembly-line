# -------------------------------------------------------
# Log4j 1.2 configuration
# -------------------------------------------------------

# Root logger: INFO level, two appenders: console and rolling file
log4j.rootLogger=INFO, CONSOLE, FILE

# --- Console appender ---
log4j.appender.CONSOLE=org.apache.log4j.ConsoleAppender
log4j.appender.CONSOLE.layout=org.apache.log4j.PatternLayout
log4j.appender.CONSOLE.layout.ConversionPattern=%d{HH:mm:ss.SSS} %-5p [%-20t] %c{1} - %m%n

# --- Rolling file appender (rolls over at 5 MB, keeps 3 backups) ---
log4j.appender.FILE=org.apache.log4j.RollingFileAppender
log4j.appender.FILE.File=factory_app.log
log4j.appender.FILE.MaxFileSize=5MB
log4j.appender.FILE.MaxBackupIndex=3
log4j.appender.FILE.layout=org.apache.log4j.PatternLayout
log4j.appender.FILE.layout.ConversionPattern=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5p [%t] %c - %m%n

# Make the thread-pool package a bit quieter so it doesn't flood the console
log4j.logger.ru.nsu.ccfit.Tanya.threadpool=WARN